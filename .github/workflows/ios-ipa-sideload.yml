name: iOS IPA for Sideloading

on:
  push:
    branches: [ main ]
    paths:
      - 'StrawberryManager-iOS/**'
      - '.github/workflows/ios-ipa-sideload.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'App version'
        required: false
        default: '1.0.0'

jobs:
  build-ipa:
    name: Build Sideloadable IPA
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Xcode
      run: |
        xcodebuild -version
        swift --version
        which xcodebuild
    
    - name: Install build tools
      run: |
        brew install xcodegen ldid
        xcodegen --version
    
    - name: Prepare build environment
      working-directory: StrawberryManager-iOS
      run: |
        echo "📁 Preparing build environment..."
        
        # Create Assets catalog
        mkdir -p Assets.xcassets/AppIcon.appiconset
        cat > Assets.xcassets/AppIcon.appiconset/Contents.json << 'JSON'
        {
          "images" : [
            {
              "idiom" : "universal",
              "platform" : "ios",
              "size" : "1024x1024"
            }
          ],
          "info" : {
            "author" : "xcode",
            "version" : 1
          }
        }
        JSON
        
        echo "✅ Assets catalog created"
    
    - name: Generate Xcode Project with compatibility
      working-directory: StrawberryManager-iOS
      run: |
        echo "🔨 Generating Xcode project..."
        
        # Generate with XcodeGen
        xcodegen generate --spec project.yml
        
        # Check if project was created
        if [ ! -d "StrawberryManager.xcodeproj" ]; then
          echo "❌ Project generation failed"
          exit 1
        fi
        
        echo "✅ Xcode project generated successfully"
        ls -la StrawberryManager.xcodeproj/
    
    - name: List available schemes
      working-directory: StrawberryManager-iOS
      run: |
        echo "📋 Available build schemes:"
        xcodebuild -list -project StrawberryManager.xcodeproj 2>&1 || true
        echo ""
        echo "📋 Available destinations:"
        xcodebuild -showdestinations -project StrawberryManager.xcodeproj -scheme StrawberryManager 2>&1 | grep "platform:iOS" | head -10 || true
    
    - name: Build for iOS
      working-directory: StrawberryManager-iOS
      run: |
        echo "🏗️  Building iOS app..."
        
        set -x
        xcodebuild archive \
          -project StrawberryManager.xcodeproj \
          -scheme StrawberryManager \
          -configuration Release \
          -archivePath ../build/StrawberryManager.xcarchive \
          -destination 'generic/platform=iOS' \
          -allowProvisioningUpdates \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM="" \
          ENABLE_BITCODE=NO \
          COMPILER_INDEX_STORE_ENABLE=NO
        set +x
        
        echo "✅ Build completed"
        ls -la ../build/StrawberryManager.xcarchive/
    
    - name: Verify app bundle
      run: |
        echo "🔍 Verifying app bundle..."
        APP_PATH="build/StrawberryManager.xcarchive/Products/Applications/StrawberryManager.app"
        
        if [ ! -d "$APP_PATH" ]; then
          echo "❌ App bundle not found at $APP_PATH"
          echo "📂 Contents of archive:"
          find build/StrawberryManager.xcarchive -type d -maxdepth 3
          exit 1
        fi
        
        echo "✅ App bundle found"
        ls -lh "$APP_PATH"
        
        # Check for executable
        if [ -f "$APP_PATH/StrawberryManager" ]; then
          echo "✅ Executable found"
          file "$APP_PATH/StrawberryManager"
        else
          echo "❌ Executable not found"
          ls -la "$APP_PATH/"
          exit 1
        fi
    
    - name: Create unsigned IPA
      run: |
        echo "📦 Creating unsigned IPA..."
        mkdir -p Payload
        
        cp -r build/StrawberryManager.xcarchive/Products/Applications/StrawberryManager.app Payload/
        
        zip -qr StrawberryManager-unsigned.ipa Payload
        
        echo "✅ Unsigned IPA created"
        ls -lh StrawberryManager-unsigned.ipa
        unzip -l StrawberryManager-unsigned.ipa | head -20
    
    - name: Create fakesigned IPA (for jailbroken devices)
      run: |
        echo "🔐 Creating fakesigned IPA with ldid..."
        mkdir -p Payload-signed
        
        cp -r build/StrawberryManager.xcarchive/Products/Applications/StrawberryManager.app Payload-signed/
        
        # Fakesign the binary
        ldid -S Payload-signed/StrawberryManager.app/StrawberryManager
        
        zip -qr StrawberryManager-fakesigned.ipa Payload-signed
        
        echo "✅ Fakesigned IPA created"
        ls -lh StrawberryManager-fakesigned.ipa
    
    - name: Create installation guide
      run: |
        cat > SIDELOAD_INSTRUCTIONS.txt << 'INSTRUCTIONS'
        📱 Strawberry Manager iOS - Installation Guide
        ═══════════════════════════════════════════════
        
        ✅ BUILD SUCCESSFUL! You now have 2 IPA files.
        
        ═══════════════════════════════════════════════
        📦 FILES INCLUDED:
        ═══════════════════════════════════════════════
        
        1. StrawberryManager-unsigned.ipa
           → For normal iPhones (non-jailbroken)
           → Use with AltStore or Sideloadly
           → Valid for 7 days, then quick re-sign
        
        2. StrawberryManager-fakesigned.ipa
           → For jailbroken iPhones only
           → Install with Filza File Manager
           → Permanent installation
        
        ═══════════════════════════════════════════════
        🌟 EASIEST METHOD: AltStore (FREE)
        ═══════════════════════════════════════════════
        
        No Apple Developer account needed!
        
        Step 1: Download AltStore
          → Visit: https://altstore.io/
          → Download for Windows or Mac
        
        Step 2: Install AltServer
          → Run the installer
          → AltServer runs in system tray
        
        Step 3: Install AltStore on iPhone
          → Connect iPhone via USB
          → Click AltServer icon → Install AltStore
          → Enter Apple ID when prompted
          → Trust in Settings → General → Device Management
        
        Step 4: Sideload the App
          → Open AltStore on iPhone
          → Tap "My Apps" tab
          → Tap "+" button
          → Select: StrawberryManager-unsigned.ipa
          → Wait 1-2 minutes
          → Done! App appears on home screen
        
        Step 5: Auto-Refresh Setup (Optional)
          → Keep AltServer running on PC
          → iPhone and PC on same Wi-Fi
          → AltStore refreshes apps automatically
        
        ═══════════════════════════════════════════════
        📲 ALTERNATIVE: Sideloadly
        ═══════════════════════════════════════════════
        
        Step 1: Download Sideloadly
          → Visit: https://sideloadly.io/
        
        Step 2: Connect and Sideload
          → Connect iPhone via USB
          → Drag StrawberryManager-unsigned.ipa to Sideloadly
          → Enter Apple ID (free works!)
          → Click "Start"
          → Wait for installation
        
        FREE Apple ID = 7 days validity
        PAID Developer ($99/year) = 1 year validity
        
        ═══════════════════════════════════════════════
        🔓 FOR JAILBROKEN IPHONES:
        ═══════════════════════════════════════════════
        
        Much simpler - no computer needed!
        
        Step 1: Download IPA on iPhone
          → Use Safari to download StrawberryManager-fakesigned.ipa
        
        Step 2: Install
          → Open in Filza File Manager
          → Tap IPA → Installer → Install
          → Respring if needed
          → Done! Permanent installation ✅
        
        Requirements:
          → Jailbroken iPhone (checkra1n, unc0ver, Dopamine, etc.)
          → AppSync Unified installed
          → Filza or similar file manager
        
        ═══════════════════════════════════════════════
        🆘 TROUBLESHOOTING
        ═══════════════════════════════════════════════
        
        Problem: "Untrusted Enterprise Developer"
        Solution:
          → Settings → General → VPN & Device Management
          → Tap your Apple ID under "Developer App"
          → Tap "Trust <Your Apple ID>"
        
        Problem: "Unable to Install App"
        Solution:
          → Delete any old version first
          → Restart iPhone
          → Try a different USB cable
          → Re-download the IPA
          → Use Sideloadly instead of AltStore (or vice versa)
        
        Problem: "App Crashes on Launch"
        Solution:
          → Ensure iOS 17.0 or newer
          → Re-sign with fresh certificate
          → Try fakesigned version if jailbroken
        
        Problem: AltStore says "Could not find AltServer"
        Solution:
          → Ensure iPhone and PC on same Wi-Fi network
          → Disable VPN temporarily
          → Disable firewall temporarily
          → Restart AltServer application
          → Check AltServer is running (system tray icon)
        
        ═══════════════════════════════════════════════
        💰 COST COMPARISON
        ═══════════════════════════════════════════════
        
        AltStore (free):        FREE (refresh every 7 days)
        Sideloadly (free):      FREE (refresh every 7 days)
        Jailbreak method:       FREE (permanent install)
        Apple Developer:        $99/year (refresh yearly)
        
        ═══════════════════════════════════════════════
        📱 REQUIREMENTS
        ═══════════════════════════════════════════════
        
        iPhone Requirements:
          ✓ iOS 17.0 or higher
          ✓ ~30 MB free storage
          ✓ Wi-Fi or cellular connection
        
        Computer Requirements (for sideloading):
          ✓ Windows 10/11 or macOS 10.15+
          ✓ iTunes installed (Windows) or Finder (Mac)
          ✓ USB cable
        
        ═══════════════════════════════════════════════
        
        Questions? Check the GitHub repository README or create an issue!
        
        Repository: https://github.com/KolliasG7/Strawberry-Manager---Reworked
        INSTRUCTIONS
        
        echo "✅ Instructions file created"
    
    - name: Upload IPA files
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa-files
        path: |
          StrawberryManager-unsigned.ipa
          StrawberryManager-fakesigned.ipa
          SIDELOAD_INSTRUCTIONS.txt
        retention-days: 90
    
    - name: Build Summary
      run: |
        echo ""
        echo "════════════════════════════════════════════════════"
        echo "✅  iOS IPA BUILD SUCCESSFUL!"
        echo "════════════════════════════════════════════════════"
        echo ""
        echo "📦 Created files:"
        ls -lh *.ipa SIDELOAD_INSTRUCTIONS.txt
        echo ""
        echo "📥 Download from:"
        echo "   Actions → this workflow run → Artifacts → ios-ipa-files"
        echo ""
        echo "📱 Install on iPhone:"
        echo "   1. Download ios-ipa-files.zip and unzip"
        echo "   2. Install AltStore from https://altstore.io/"
        echo "   3. Sideload StrawberryManager-unsigned.ipa"
        echo "   4. Use your FREE Apple ID (no paid account needed)"
        echo ""
        echo "🔓 For jailbroken iPhones:"
        echo "   → Use StrawberryManager-fakesigned.ipa"
        echo "   → Install with Filza (permanent!)"
        echo ""
        echo "📖 Full instructions in SIDELOAD_INSTRUCTIONS.txt"
        echo "════════════════════════════════════════════════════"
