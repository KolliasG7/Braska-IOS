name: iOS IPA for Sideloading

on:
  push:
    branches: [ main ]
    paths:
      - 'StrawberryManager-iOS/**'
      - '.github/workflows/ios-ipa-sideload.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'App version'
        required: false
        default: '1.0.0'

jobs:
  build-ipa:
    name: Build Sideloadable IPA
    runs-on: macos-13
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    
    - name: Verify Xcode version
      run: |
        xcodebuild -version
        swift --version
    
    - name: Install XcodeGen and tools
      run: |
        brew install xcodegen@2.38.0 || brew install xcodegen
        brew install ldid
    
    - name: Generate Xcode Project
      working-directory: StrawberryManager-iOS
      run: |
        echo "🔨 Generating Xcode project with XcodeGen..."
        xcodegen generate
        echo "✅ Xcode project generated"
        ls -la *.xcodeproj
    
    - name: Verify project structure
      working-directory: StrawberryManager-iOS
      run: |
        echo "📁 Checking project structure..."
        xcodebuild -list -project StrawberryManager.xcodeproj
    
    - name: Build for iOS Device
      working-directory: StrawberryManager-iOS
      run: |
        echo "🏗️  Building for iOS device..."
        xcodebuild clean archive \
          -project StrawberryManager.xcodeproj \
          -scheme StrawberryManager \
          -configuration Release \
          -archivePath ../build/StrawberryManager.xcarchive \
          -destination 'generic/platform=iOS' \
          -allowProvisioningUpdates \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM="" | xcbeautify || xcodebuild clean archive \
          -project StrawberryManager.xcodeproj \
          -scheme StrawberryManager \
          -configuration Release \
          -archivePath ../build/StrawberryManager.xcarchive \
          -destination 'generic/platform=iOS' \
          -allowProvisioningUpdates \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM=""
    
    - name: Create unsigned IPA
      run: |
        echo "📦 Creating unsigned IPA..."
        mkdir -p Payload
        
        # Copy .app to Payload
        cp -r build/StrawberryManager.xcarchive/Products/Applications/StrawberryManager.app Payload/
        
        # Create IPA (it's just a zip)
        zip -r StrawberryManager-unsigned.ipa Payload
        
        echo "✅ Unsigned IPA created"
        ls -lh StrawberryManager-unsigned.ipa
    
    - name: Sign with ldid (for jailbroken devices)
      run: |
        echo "🔐 Fakesigning with ldid..."
        
        # Create copy for signing
        mkdir -p Payload-signed
        cp -r build/StrawberryManager.xcarchive/Products/Applications/StrawberryManager.app Payload-signed/
        
        # Fakesign with ldid
        ldid -S Payload-signed/StrawberryManager.app/StrawberryManager
        
        # Create signed IPA
        zip -r StrawberryManager-fakesigned.ipa Payload-signed
        
        echo "✅ Fakesigned IPA created"
        ls -lh StrawberryManager-fakesigned.ipa
    
    - name: Create sideload instructions
      run: |
        cat > SIDELOAD_INSTRUCTIONS.txt << 'EOF'
        📱 Strawberry Manager iOS - Sideloading Guide
        ═══════════════════════════════════════════
        
        You have TWO IPA files:
        
        1️⃣  StrawberryManager-unsigned.ipa
           ✅ For regular iPhones (non-jailbroken)
           ✅ Use with AltStore or Sideloadly
           ⏱️  Valid 7 days, then re-sign (1-minute process)
        
        2️⃣  StrawberryManager-fakesigned.ipa  
           ✅ For jailbroken iPhones ONLY
           ✅ Install directly with Filza
           ⏱️  Permanent installation
        
        ═══════════════════════════════════════════
        🌟 RECOMMENDED: AltStore (FREE, EASY)
        ═══════════════════════════════════════════
        
        Windows or Mac (No Apple Developer account needed!)
        
        1. Download AltStore from: https://altstore.io/
        
        2. Install AltServer on your computer
        
        3. Connect iPhone via USB cable
        
        4. Follow AltStore setup wizard
        
        5. Open AltStore app on iPhone
        
        6. Tap "My Apps" → "+" button
        
        7. Select: StrawberryManager-unsigned.ipa
        
        8. Sign in with FREE Apple ID (no paid account!)
        
        9. Wait 1-2 minutes for installation
        
        10. Done! App appears on home screen
        
        📝 Notes:
        - Apps expire after 7 days
        - AltStore auto-refreshes when on same Wi-Fi
        - Or manually refresh in AltStore app
        - Takes ~30 seconds to refresh
        
        ═══════════════════════════════════════════
        📲 OPTION 2: Sideloadly
        ═══════════════════════════════════════════
        
        Windows or Mac
        
        1. Download from: https://sideloadly.io/
        
        2. Connect iPhone via USB
        
        3. Drag StrawberryManager-unsigned.ipa into Sideloadly
        
        4. Enter Apple ID (free or paid)
        
        5. Click "Start"
        
        6. Wait for installation
        
        FREE Apple ID: 7-day validity
        PAID Developer ($99/year): 1-year validity
        
        ═══════════════════════════════════════════
        🔓 OPTION 3: Jailbroken iPhone
        ═══════════════════════════════════════════
        
        No computer needed!
        
        1. Download StrawberryManager-fakesigned.ipa on iPhone
        
        2. Open in Filza File Manager
        
        3. Tap IPA file → Installer → Install
        
        4. Done! Permanent installation ✅
        
        Requirements:
        - Jailbroken iPhone (checkra1n, unc0ver, etc.)
        - Filza or similar file manager
        - AppSync Unified installed
        
        ═══════════════════════════════════════════
        ⚙️  OPTION 4: iOS App Signer (Mac)
        ═══════════════════════════════════════════
        
        If you have Mac access:
        
        1. Download iOS App Signer
        
        2. Open StrawberryManager-unsigned.ipa
        
        3. Select your signing certificate
        
        4. Click "Start"
        
        5. Install resulting IPA with Xcode or Configurator
        
        ═══════════════════════════════════════════
        🆘 TROUBLESHOOTING
        ═══════════════════════════════════════════
        
        "Untrusted Enterprise Developer"
        → Settings → General → VPN & Device Management
        → Tap your Apple ID → Trust
        
        "Unable to Install App"
        → Delete old version first
        → Restart iPhone
        → Try different cable
        → Re-download IPA
        
        "App Crashes Immediately"
        → Check iOS version (need 17.0+)
        → Re-sign with fresh certificate
        → Check Settings → Privacy for any restrictions
        
        AltStore "Could not find AltServer"
        → Ensure iPhone and PC on same Wi-Fi
        → Disable firewall temporarily
        → Restart AltServer
        
        ═══════════════════════════════════════════
        📱 REQUIREMENTS
        ═══════════════════════════════════════════
        
        - iOS 17.0 or higher
        - ~30 MB free space
        - Internet connection (to connect to PS4)
        
        ═══════════════════════════════════════════
        💰 COST COMPARISON
        ═══════════════════════════════════════════
        
        AltStore:           FREE (7-day re-sign)
        Sideloadly:         FREE (7-day re-sign)
        Jailbreak Method:   FREE (permanent)
        Apple Developer:    $99/year (1-year validity)
        
        ═══════════════════════════════════════════
        
        For official App Store distribution (no sideloading needed):
        - Requires Apple Developer account
        - Add certificates to GitHub Secrets
        - See AUTOMATION_GUIDE.md
        
        Questions? See README.md files or GitHub Issues
        ═══════════════════════════════════════════
        EOF
        
        echo "✅ Instructions created"
    
    - name: Upload IPAs and Instructions
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa-files
        path: |
          StrawberryManager-unsigned.ipa
          StrawberryManager-fakesigned.ipa
          SIDELOAD_INSTRUCTIONS.txt
        retention-days: 90
    
    - name: Build Summary
      run: |
        echo ""
        echo "════════════════════════════════════════════"
        echo "✅ iOS IPA BUILD COMPLETE!"
        echo "════════════════════════════════════════════"
        echo ""
        echo "📦 Files created:"
        ls -lh *.ipa
        echo ""
        echo "📥 Download from: Actions → Artifacts → ios-ipa-files"
        echo ""
        echo "🎯 Quick Start:"
        echo "1. Download ios-ipa-files.zip"
        echo "2. Install AltStore from https://altstore.io/"
        echo "3. Sideload StrawberryManager-unsigned.ipa"
        echo "4. No paid Apple Developer account needed!"
        echo ""
        echo "📖 See SIDELOAD_INSTRUCTIONS.txt for all methods"
        echo "════════════════════════════════════════════"
