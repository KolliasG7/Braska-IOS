# XcodeGen configuration for Strawberry Manager iOS
name: StrawberryManager

options:
  bundleIdPrefix: com.github.strawberrymanager
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  xcodeVersion: "15.0"

settings:
  base:
    PRODUCT_NAME: StrawberryManager
    SWIFT_VERSION: "5.9"
    ENABLE_BITCODE: NO
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    DEVELOPMENT_TEAM: ""
    INFOPLIST_FILE: Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    TARGETED_DEVICE_FAMILY: "1,2"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  StrawberryManager:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - StrawberryManagerApp.swift
      - Models
      - ViewModels  
      - Views
      - Services
      - Utilities
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.github.strawberrymanager.ios
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
